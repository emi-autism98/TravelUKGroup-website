name: Update Stats

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

# Grants the workflow permission to push changes back to your repository
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # Upgraded to v4

      - name: Set up Python
        uses: actions/setup-python@v5 # Upgraded to v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python scrape.py

      - name: Commit and push updated stats
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stats.json
          # The || true prevents the script from crashing if stats.json hasn't changed
          git commit -m "Auto update stats" || true 
          git push
